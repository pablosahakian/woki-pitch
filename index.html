function b64ToBytes(b64) { const bin = atob(b64); const out = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i); return out; }
const form = document.getElementById('f'); const pw = document.getElementById('pw'); const btn = document.getElementById('btn'); const err = document.getElementById('err');
form.addEventListener('submit', async (e) => {
  e.preventDefault(); err.textContent = ''; btn.disabled = true; btn.textContent = 'Desencriptando...';
  try {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw.value), { name: 'PBKDF2' }, false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: b64ToBytes(PAYLOAD.salt), iterations: PAYLOAD.iter, hash: 'SHA-256' }, baseKey, { name: 'AES-CBC', length: 256 }, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: b64ToBytes(PAYLOAD.iv) }, key, b64ToBytes(PAYLOAD.ct));
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch (ex) {
    err.textContent = 'Contraseña incorrecta.'; btn.disabled = false; btn.textContent = 'Acceder'; pw.select();
  }
});
